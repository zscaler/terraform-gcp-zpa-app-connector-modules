formatter: "markdown table"

# Match the marker strings that already exist in every README in this repo
# (and that the pre-commit-terraform `terraform_docs` hook also writes).
# This keeps `terraform-docs` rewriting in place, leaving the hand-written
# intro above the markers untouched.
output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGINNING OF PRE-COMMIT-TERRAFORM DOCS HOOK -->
    {{ .Content }}
    <!-- END OF PRE-COMMIT-TERRAFORM DOCS HOOK -->

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true
